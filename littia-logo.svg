<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>LITTIA Logo</title>
<desc>Logo LITTIA — maison dorée avec feuille verte, texte serif espacé</desc>

<defs>
  <style>
    .on-dark { display: block; }
    .on-light { display: none; }
    @media (prefers-color-scheme: light) {
      .on-dark { display: none; }
      .on-light { display: block; }
    }
  </style>
</defs>

<!-- VERSION FOND SOMBRE (défaut) -->
<g class="on-dark">
  <!-- HOUSE - roof -->
  <polyline points="200,60 126,128 274,128" fill="none" stroke="#C9A84C" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Left wall -->
  <line x1="129" y1="126" x2="129" y2="248" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right wall -->
  <line x1="271" y1="126" x2="271" y2="248" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Floor -->
  <line x1="129" y1="248" x2="271" y2="248" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Inner horizontal divider -->
  <line x1="129" y1="188" x2="271" y2="188" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Inner vertical divider -->
  <line x1="200" y1="128" x2="200" y2="248" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Window panes — subtle fill -->
  <rect x="132" y="130" width="65" height="56" fill="#C9A84C" fill-opacity="0.08" rx="2"/>
  <rect x="203" y="191" width="65" height="55" fill="#C9A84C" fill-opacity="0.05" rx="2"/>

  <!-- LEAF — bottom right quadrant -->
  <!-- Blade 1 -->
  <path d="M216 234 Q228 210 246 205 Q242 225 224 236 Z" fill="#4A7A5A" opacity="0.95"/>
  <!-- Blade 2 -->
  <path d="M218 238 Q232 214 252 211 Q246 232 228 241 Z" fill="#5A9E8C" opacity="0.85"/>
  <!-- Stem -->
  <path d="M218 240 Q213 248 208 254" fill="none" stroke="#4A7A5A" stroke-width="2" stroke-linecap="round"/>

  <!-- LITTIA text -->
  <text x="200" y="302" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
        font-size="42" font-weight="400" letter-spacing="14"
        fill="#FFFFFF">LITTIA</text>

  <!-- Gold underline -->
  <line x1="158" y1="314" x2="242" y2="314" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Subtitle line 1 -->
  <text x="200" y="340" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13" letter-spacing="5" fill="rgba(255,255,255,0.45)">ORGANISATION DES</text>
  <!-- Subtitle line 2 -->
  <text x="200" y="358" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13" letter-spacing="5" fill="rgba(255,255,255,0.45)">TÂCHES MÉNAGÈRES</text>
</g>

<!-- VERSION FOND CLAIR -->
<g class="on-light">
  <!-- HOUSE -->
  <polyline points="200,60 126,128 274,128" fill="none" stroke="#B8903A" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="129" y1="126" x2="129" y2="248" stroke="#B8903A" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="271" y1="126" x2="271" y2="248" stroke="#B8903A" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="129" y1="248" x2="271" y2="248" stroke="#B8903A" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="129" y1="188" x2="271" y2="188" stroke="#B8903A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="128" x2="200" y2="248" stroke="#B8903A" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="132" y="130" width="65" height="56" fill="#B8903A" fill-opacity="0.07" rx="2"/>
  <rect x="203" y="191" width="65" height="55" fill="#B8903A" fill-opacity="0.04" rx="2"/>
  <!-- LEAF -->
  <path d="M216 234 Q228 210 246 205 Q242 225 224 236 Z" fill="#3D6B5E" opacity="0.95"/>
  <path d="M218 238 Q232 214 252 211 Q246 232 228 241 Z" fill="#5A9E8C" opacity="0.8"/>
  <path d="M218 240 Q213 248 208 254" fill="none" stroke="#3D6B5E" stroke-width="2" stroke-linecap="round"/>
  <!-- LITTIA text -->
  <text x="200" y="302" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
        font-size="42" font-weight="400" letter-spacing="14"
        fill="#0D0F14">LITTIA</text>
  <line x1="158" y1="314" x2="242" y2="314" stroke="#B8903A" stroke-width="1.5" stroke-linecap="round"/>
  <text x="200" y="340" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13" letter-spacing="5" fill="rgba(13,15,20,0.4)">ORGANISATION DES</text>
  <text x="200" y="358" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13" letter-spacing="5" fill="rgba(13,15,20,0.4)">TÂCHES MÉNAGÈRES</text>
</g>

</svg>
